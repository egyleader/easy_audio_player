name: easy_audio_player
description: A drop-in Flutter audio player with background playback, notification controls, and Material 3 adaptive theming.
version: 1.0.0-beta.1
homepage: https://github.com/egyleader/easy_audio_player

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.2.3
  just_waveform: ^0.0.7
  rxdart: ^0.28.0
  audio_video_progress_bar: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
